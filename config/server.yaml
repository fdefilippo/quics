listen_addr: "0.0.0.0"
listen_port: 4243

tls:
  cert_file: "certs/server.crt"
  key_file: "certs/server.key"

auth:
  client_ca_file: ""

storage:
  root_dir: "./files"

# QUIC connection settings
quic:
  max_idle_timeout_seconds: 300     # 5 minutes, set to 0 to use default (120s)
  keep_alive_period_seconds: 15     # send keepalive packets every 15s, set to -1 to disable, 0 uses default (15s)

shell:
  enabled: true
  # Allowed commands can be literal strings or regex patterns (containing ^ $ . * + ? ( ) [ ] { } | \)
  allowed_commands: []
  max_execution_time_seconds: 30
  allowed_env_vars: []

# Logging configuration
log:
  type: "stderr"  # stderr, file, syslog
  # file_path: "/var/log/quicsd.log"  # required if type=file
  # syslog_host: "localhost"  # optional, default localhost
  # syslog_port: 514          # optional, default 514
