listen_addr: "0.0.0.0"
listen_port: 4243

tls:
  cert_file: "certs/server.crt"
  key_file: "certs/server.key"

auth:
  client_ca_file: "certs/ca-ecdsa.crt"
  certs_dir: "./certs"

storage:
  root_dir: "./files"

# QUIC connection settings
quic:
  max_idle_timeout_seconds: 300     # 5 minutes, set to 0 to use default (120s)
  keep_alive_period_seconds: 15     # send keepalive packets every 15s, set to -1 to disable, 0 uses default (15s)

shell:
  enabled: true
  # Allowed commands can be literal strings or regex patterns (containing ^ $ . * + ? ( ) [ ] { } | \)
  allowed_commands: ["^ls.*", "mkdir", "^rm.*", "cat", "echo", "pwd", "printf"]
  max_execution_time_seconds: 30
  allowed_env_vars: ["PATH", "HOME", "USER", "CUSTOM_VAR"]

# Webhook notifications (optional)
# webhook:
#   url: "http://localhost:8080/webhook"
#   timeout_seconds: 10
#   retry_count: 2
#   enabled: false
#   # Authentication: none, basic, bearer, mtls
#   auth_type: "none"
#   username: ""           # for basic auth
#   password: ""           # for basic auth
#   bearer_token: ""       # for bearer auth
#   client_cert: ""        # for mtls (certificate file)
#   client_key: ""         # for mtls (private key file)
#   insecure_skip_verify: false  # skip SSL certificate verification